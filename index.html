<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spoti'stat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="style/style.css" />
  </head>

  <body class="bg-light" x-data="spotifApp()" x-init="init()">

    <header class="bg-primary text-white py-5 mb-4">
      <div class="container text-center">
        <h1 class="display-4 fw-bold">Les musiques de Nérimen</h1>
        <p class="lead mb-0">Bienvenue dans mon projet Spoti'stat</p>
      </div>
    </header>

    <main class="container pb-5">
      <section aria-label="Graphiques statistiques" class="mb-5">
        <div class="row g-4">

      
          <div class="col-12 col-lg-6">
            <div class="card shadow-sm h-100">
              <div class="card-header fw-semibold text-white" style="background:#133464;">
                <i class="bi bi-bar-chart-fill me-2" aria-hidden="true"></i>Top 10 des Artistes
              </div>
              <div class="card-body">
                <canvas id="chartArtistes"
                  aria-label="Graphique en barres horizontales montrant le top 10 des artistes par nombre de morceaux"
                  role="img">
                </canvas>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-6">
            <div class="card shadow-sm h-100">
              <div class="card-header fw-semibold text-white" style="background:#FF2687;">
                <i class="bi bi-pie-chart-fill me-2" aria-hidden="true"></i>Distribution des Genres
              </div>
              <div class="card-body d-flex align-items-center justify-content-center">
                <canvas id="chartGenres"
                  aria-label="Camembert montrant la distribution des genres musicaux"
                  role="img"
                  style="max-height:320px;">
                </canvas>
              </div>
            </div>
          </div>

        </div>
      </section>

      <section aria-label="Liste des morceaux" class="mb-5">
        <div class="card shadow-sm">

        
          <div class="card-header d-flex flex-wrap align-items-center justify-content-between gap-2"
               style="background:#D8FF76; color:#133464;">
            <span class="fw-semibold fs-5">
              <i class="bi bi-music-note-list me-2" aria-hidden="true"></i>Liste des Morceaux
            </span>
            <div class="input-group input-group-sm" style="max-width:260px;">
              <span class="input-group-text"><i class="bi bi-search" aria-hidden="true"></i></span>
              <label for="searchInput" class="visually-hidden">Rechercher un morceau, artiste ou album</label>
              <input
                id="searchInput"
                type="search"
                class="form-control"
                placeholder="Rechercher..."
                x-model="search"
                aria-label="Rechercher un morceau, artiste ou album"
              />
            </div>
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th scope="col">Titre</th>
                  <th scope="col">Artiste</th>
                  <th scope="col">Album</th>
                  <th scope="col">Action</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="track in filteredTracks" :key="track.id">
                  <tr>
                    <td class="fw-medium" x-text="track.name"></td>
                    <td class="text-muted" x-text="track.artists.map(a => a.name).join(', ')"></td>
                    <td class="text-muted" x-text="track.album.name"></td>
                    <td>
                      <button
                        class="btn btn-primary btn-sm"
                        type="button"
                        :aria-label="'Voir les détails de ' + track.name"
                        @click="openModal(track)"
                        data-bs-toggle="modal"
                        data-bs-target="#detailModal"
                      >
                        <i class="bi bi-info-circle me-1" aria-hidden="true"></i>Détails
                      </button>
                    </td>
                  </tr>
                </template>
              
                <tr x-show="filteredTracks.length === 0">
                  <td colspan="4" class="text-center text-muted py-4">
                    <i class="bi bi-search me-2"></i>Aucun morceau trouvé pour "<span x-text="search"></span>"
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>
      </section>

      <section aria-label="Albums populaires">
        <h2 class="fw-bold mb-4">Albums Populaires</h2>
        <div class="row g-3">
          <template x-for="album in topAlbums" :key="album.id">
            <div class="col-6 col-sm-4 col-md-3 col-xl-2">
              <div class="card album-card h-100 shadow-sm">
                <img
                  :src="album.images[1]?.url || album.images[0]?.url || 'https://via.placeholder.com/250'"
                  :alt="'Pochette de l\'album ' + album.name"
                  class="card-img-top"
                  style="aspect-ratio:1/1; object-fit:cover;"
                  loading="lazy"
                />
                <div class="card-body p-2">
                  <div class="fw-semibold small text-truncate" x-text="album.name" :title="album.name"></div>
                  <div class="text-muted small text-truncate" x-text="album.artists.map(a=>a.name).join(', ')"></div>
                  <div class="text-muted small mt-1" x-text="album.release_date?.slice(0,4) ? formatDate(album.release_date) : ''"></div>
                  <div class="d-flex gap-1 mt-2 flex-wrap">
                    <span class="badge rounded-pill text-bg-info" x-text="album.total_tracks + ' titres'"></span>
                    <span class="badge rounded-pill text-bg-success" x-text="album.popularity + '/100'"></span>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
      </section>

    </main>

    <div class="modal fade" id="detailModal" tabindex="-1"
         aria-labelledby="detailModalLabel" aria-modal="true" role="dialog">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">

          <div class="modal-header">
            <h2 class="modal-title h5" id="detailModalLabel">Détails du morceau</h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
          </div>

          <div class="modal-body">
            <template x-if="selectedTrack">
              <div class="row g-4">

                <!-- Colonne gauche : pochette + infos album -->
                <div class="col-md-4 text-center">
                  <img
                    :src="selectedTrack.album.images[1]?.url || selectedTrack.album.images[0]?.url"
                    :alt="'Pochette de ' + selectedTrack.album.name"
                    class="img-fluid rounded-3 shadow mb-3"
                    style="max-width:200px;"
                  />
                  <div class="fw-semibold text-truncate" x-text="selectedTrack.name" :title="selectedTrack.name"></div>
                  <div class="text-muted small mt-1"
                       x-text="formatDate(selectedTrack.album.release_date) + ' · ' + selectedTrack.album.total_tracks + ' titres'">
                  </div>
                  <span class="badge rounded-pill mt-2 text-white" style="background:#1DB954;">
                    Popularité&nbsp;: <span x-text="selectedTrack.album.popularity"></span>/100
                  </span>
                </div>

                <!-- Colonne droite : détails -->
                <div class="col-md-8">
                  <h3 class="h5 fw-bold mb-3" x-text="selectedTrack.name"></h3>

                  <!-- Preview audio -->
                  <template x-if="selectedTrack.preview_url">
                    <div class="mb-3">
                      <div class="text-muted small fw-semibold mb-1">Preview audio</div>
                      <audio controls :src="selectedTrack.preview_url"
                             class="w-100" aria-label="Extrait audio du morceau">
                        Votre navigateur ne supporte pas l'élément audio.
                      </audio>
                    </div>
                  </template>

                  <!-- Tableau d'informations -->
                  <div class="fw-semibold mb-2">Informations sur le morceau</div>
                  <table class="table table-sm table-borderless mb-3">
                    <tbody>
                      <tr class="border-bottom">
                        <td class="text-muted ps-0">Durée</td>
                        <td class="text-end pe-0">
                          <span class="badge rounded-pill text-white" style="background:#133464;"
                                x-text="formatDuration(selectedTrack.duration_ms)"></span>
                        </td>
                      </tr>
                      <tr class="border-bottom">
                        <td class="text-muted ps-0">Popularité</td>
                        <td class="pe-0">
                          <div class="d-flex align-items-center gap-2 justify-content-end">
                            <div class="progress flex-grow-1" style="height:8px; max-width:120px;"
                                 role="progressbar"
                                 :aria-valuenow="selectedTrack.popularity"
                                 aria-valuemin="0" aria-valuemax="100">
                              <div class="progress-bar" style="background:#00b4d8;"
                                   :style="'width:'+selectedTrack.popularity+'%'"></div>
                            </div>
                            <span class="text-muted small" x-text="selectedTrack.popularity+'/100'"></span>
                          </div>
                        </td>
                      </tr>
                      <tr class="border-bottom">
                        <td class="text-muted ps-0">Numéro de piste</td>
                        <td class="text-end pe-0 text-muted" x-text="selectedTrack.track_number"></td>
                      </tr>
                      <tr>
                        <td class="text-muted ps-0">Explicit</td>
                        <td class="text-end pe-0 fw-semibold"
                            :class="selectedTrack.explicit ? 'text-danger' : 'text-success'"
                            x-text="selectedTrack.explicit ? 'Oui' : 'Non'">
                        </td>
                      </tr>
                    </tbody>
                  </table>

                  <!-- Artistes -->
                  <div class="fw-semibold mb-2">Artistes</div>
                  <div class="d-flex flex-column gap-2 mb-3">
                    <template x-for="artist in selectedTrack.artists" :key="artist.id">
                      <div class="d-flex align-items-center gap-3">
                        <img
                          :src="artist.images?.[1]?.url || artist.images?.[0]?.url || 'https://via.placeholder.com/40'"
                          :alt="artist.name"
                          class="rounded-circle flex-shrink-0"
                          style="width:44px;height:44px;object-fit:cover;"
                        />
                        <div>
                          <div class="fw-semibold small" x-text="artist.name"></div>
                          <div class="text-muted" style="font-size:.75rem;">
                            Popularité&nbsp;: <span x-text="artist.popularity"></span>/100
                            &nbsp;·&nbsp; Followers&nbsp;: <span x-text="(artist.followers?.total ?? 0).toLocaleString('fr-FR')"></span>
                          </div>
                        </div>
                      </div>
                    </template>
                  </div>

                  <!-- Genres -->
                  <div class="fw-semibold mb-2">Genres</div>
                  <div class="d-flex flex-wrap gap-1">
                    <template x-for="genre in selectedTrack.artists.flatMap(a=>a.genres).filter((v,i,s)=>s.indexOf(v)===i)" :key="genre">
                      <span class="badge rounded-pill text-white" style="background:#333;" x-text="genre"></span>
                    </template>
                    <span x-show="selectedTrack.artists.flatMap(a=>a.genres).length === 0"
                          class="text-muted small">N/A</span>
                  </div>

                </div>
              </div>
            </template>
          </div>

          <div class="modal-footer">
            <template x-if="selectedTrack">
              <a :href="'https://www.deezer.com/track/' + selectedTrack.id"
                 target="_blank" rel="noopener noreferrer"
                 class="btn text-white me-auto"
                 style="background:#a238ff;">
                <i class="bi bi-music-note-beamed me-1" aria-hidden="true"></i>Ouvrir dans Deezer
              </a>
            </template>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
          </div>

        </div>
      </div>
    </div>
    

    <footer class="text-center py-4 mt-5 border-top text-muted small">
      © 2025 J-Music Explorer - Projet étudiant MMI
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <script src="script/script.js"></script>
  </body>
</html>
