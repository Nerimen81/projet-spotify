<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spoti'stat</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />

    <link rel="stylesheet" href="style/style.css" />
  </head>

  <body class="bg-light" x-data="spotifApp()" x-init="init()">

    <header class="bg-primary text-white py-5 mb-4">
      <div class="container text-center">
        <h1 class="display-4 fw-bold">Les musiques de Nérimen</h1>
        <p class="lead mb-0">Bienvenue dans mon projet Spoti'stat</p>
      </div>
    </header>

    <main class="container pb-5">
      <section aria-label="Graphiques statistiques" class="mb-5">
        <div class="row g-4">

      
          <div class="col-12 col-lg-6">
            <div class="card shadow-sm h-100">
              <div class="card-header fw-semibold text-white" style="background:#133464;">
                <i class="bi bi-bar-chart-fill me-2" aria-hidden="true"></i>Top 10 des Artistes
              </div>
              <div class="card-body">
                <canvas id="chartArtistes"
                  aria-label="Graphique en barres horizontales montrant le top 10 des artistes par nombre de morceaux"
                  role="img">
                </canvas>
              </div>
            </div>
          </div>

          <div class="col-12 col-lg-6">
            <div class="card shadow-sm h-100">
              <div class="card-header fw-semibold text-white" style="background:#FF2687;">
                <i class="bi bi-pie-chart-fill me-2" aria-hidden="true"></i>Distribution des Genres
              </div>
              <div class="card-body d-flex align-items-center justify-content-center">
                <canvas id="chartGenres"
                  aria-label="Camembert montrant la distribution des genres musicaux"
                  role="img"
                  style="max-height:320px;">
                </canvas>
              </div>
            </div>
          </div>

        </div>
      </section>

      <section aria-label="Liste des morceaux" class="mb-5">
        <div class="card shadow-sm">

        
          <div class="card-header d-flex flex-wrap align-items-center justify-content-between gap-2"
               style="background:#D8FF76;">
            <span class="fw-semibold text-white fs-5">
              <i class="bi bi-music-note-list me-2" aria-hidden="true"></i>Liste des Morceaux
            </span>
            <div class="input-group input-group-sm" style="max-width:260px;">
              <span class="input-group-text"><i class="bi bi-search" aria-hidden="true"></i></span>
              <label for="searchInput" class="visually-hidden">Rechercher un morceau, artiste ou album</label>
              <input
                id="searchInput"
                type="search"
                class="form-control"
                placeholder="Rechercher..."
                x-model="search"
                aria-label="Rechercher un morceau, artiste ou album"
              />
            </div>
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th scope="col">Titre</th>
                  <th scope="col">Artiste</th>
                  <th scope="col">Album</th>
                  <th scope="col">Action</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="track in filteredTracks" :key="track.id">
                  <tr>
                    <td class="fw-medium" x-text="track.name"></td>
                    <td class="text-muted" x-text="track.artists.map(a => a.name).join(', ')"></td>
                    <td class="text-muted" x-text="track.album.name"></td>
                    <td>
                      <button
                        class="btn btn-primary btn-sm"
                        type="button"
                        :aria-label="'Voir les détails de ' + track.name"
                        @click="openModal(track)"
                        data-bs-toggle="modal"
                        data-bs-target="#detailModal"
                      >
                        <i class="bi bi-info-circle me-1" aria-hidden="true"></i>Détails
                      </button>
                    </td>
                  </tr>
                </template>
              
                <tr x-show="filteredTracks.length === 0">
                  <td colspan="4" class="text-center text-muted py-4">
                    <i class="bi bi-search me-2"></i>Aucun morceau trouvé pour "<span x-text="search"></span>"
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

        </div>
      </section>

      <section aria-label="Albums populaires">
        <h2 class="fw-bold mb-4">Albums Populaires</h2>
        <div class="row g-3">
          <template x-for="album in topAlbums" :key="album.id">
            <div class="col-6 col-sm-4 col-md-3 col-xl-2">
              <div class="card album-card h-100 shadow-sm">
                <img
                  :src="album.images[1]?.url || album.images[0]?.url || 'https://via.placeholder.com/250'"
                  :alt="'Pochette de l\'album ' + album.name"
                  class="card-img-top"
                  style="aspect-ratio:1/1; object-fit:cover;"
                  loading="lazy"
                />
                <div class="card-body p-2">
                  <div class="fw-semibold small text-truncate" x-text="album.name" :title="album.name"></div>
                  <div class="text-muted small text-truncate" x-text="album.artists.map(a=>a.name).join(', ')"></div>
                  <div class="text-muted small mt-1" x-text="album.release_date?.slice(0,4) ? formatDate(album.release_date) : ''"></div>
                  <div class="d-flex gap-1 mt-2 flex-wrap">
                    <span class="badge rounded-pill text-bg-info" x-text="album.total_tracks + ' titres'"></span>
                    <span class="badge rounded-pill text-bg-success" x-text="album.popularity + '/100'"></span>
                  </div>
                </div>
              </div>
            </div>
          </template>
        </div>
      </section>

    </main>

    <div class="modal fade" id="detailModal" tabindex="-1"
         aria-labelledby="detailModalLabel" aria-modal="true" role="dialog">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content" x-show="selectedTrack">
          <div class="modal-header">
            <h2 class="modal-title h5" id="detailModalLabel"
                x-text="selectedTrack ? selectedTrack.name : ''"></h2>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fermer"></button>
          </div>
          <div class="modal-body" x-show="selectedTrack">
            <template x-if="selectedTrack">
              <div class="row g-3">
                <div class="col-md-4 text-center">
                  <img
                    :src="selectedTrack.album.images[1]?.url || selectedTrack.album.images[0]?.url"
                    :alt="'Pochette de ' + selectedTrack.album.name"
                    class="img-fluid rounded shadow"
                    style="max-width:180px;"
                  />
                </div>
                <div class="col-md-8">
                  <p class="mb-1"><strong>Artiste :</strong>
                    <span x-text="selectedTrack.artists.map(a=>a.name).join(', ')"></span>
                  </p>
                  <p class="mb-1"><strong>Album :</strong>
                    <span x-text="selectedTrack.album.name"></span>
                  </p>
                  <p class="mb-1"><strong>Date de sortie :</strong>
                    <span x-text="formatDate(selectedTrack.album.release_date)"></span>
                  </p>
                  <p class="mb-1"><strong>Durée :</strong>
                    <span x-text="formatDuration(selectedTrack.duration_ms)"></span>
                  </p>
                  <p class="mb-1"><strong>Popularité :</strong></p>
                  <div class="progress mb-2" style="height:12px;"
                       role="progressbar"
                       :aria-valuenow="selectedTrack.popularity"
                       aria-valuemin="0" aria-valuemax="100"
                       :aria-label="'Popularité : ' + selectedTrack.popularity + ' sur 100'">
                    <div class="progress-bar bg-success"
                         :style="'width:' + selectedTrack.popularity + '%'"
                         x-text="selectedTrack.popularity + '/100'">
                    </div>
                  </div>
                  <p class="mb-1"><strong>Genres :</strong>
                    <span x-text="selectedTrack.artists.flatMap(a=>a.genres).filter((v,i,s)=>s.indexOf(v)===i).join(', ') || 'N/A'"></span>
                  </p>
                  <p class="mb-1"><strong>Explicite :</strong>
                    <span x-text="selectedTrack.explicit ? 'Oui' : 'Non'"></span>
                    <span x-show="selectedTrack.explicit" class="badge text-bg-danger ms-1" aria-label="Contenu explicite">E</span>
                  </p>
                  <p class="mb-1"><strong>Numéro dans l'album :</strong>
                    <span x-text="'Piste n°' + selectedTrack.track_number + ' / ' + selectedTrack.album.total_tracks"></span>
                  </p>
                  <template x-if="selectedTrack.preview_url">
                    <div class="mt-3">
                      <p class="mb-1"><strong>Écouter un extrait :</strong></p>
                      <audio controls :src="selectedTrack.preview_url"
                             aria-label="Extrait audio du morceau" class="w-100">
                        Votre navigateur ne supporte pas l'élément audio.
                      </audio>
                    </div>
                  </template>
                </div>
              </div>
            </template>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fermer</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="text-center py-4 mt-5 border-top text-muted small">
      © 2025 J-Music Explorer - Projet étudiant MMI
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
    <script src="script/script.js"></script>
  </body>
</html>
